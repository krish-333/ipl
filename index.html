<!DOCTYPE html>
<html>
<head>
  <title>IPL AI Predictor (Deep Learning)</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0b1d3a, #1e3c72);
      color: white;
      text-align: center;
      padding: 30px;
    }

    select, input, button {
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      width: 220px;
    }

    button {
      background: orange;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

<h1>🏏 IPL Deep Learning Predictor</h1>

<div class="card">
<h2>📊 Score Prediction</h2>

<select id="team">
<option>MI</option>
<option>CSK</option>
<option>RCB</option>
<option>KKR</option>
<option>SRH</option>
<option>DC</option>
<option>RR</option>
<option>PBKS</option>
<option>GT</option>
<option>LSG</option>
</select>

<select id="opponent">
<option>MI</option>
<option>CSK</option>
<option>RCB</option>
<option>KKR</option>
<option>SRH</option>
<option>DC</option>
<option>RR</option>
<option>PBKS</option>
<option>GT</option>
<option>LSG</option>
</select>

<br>

<input type="number" id="powerplay" placeholder="Powerplay runs">
<input type="number" id="runs" placeholder="Runs last 5 overs">
<input type="number" id="wickets" placeholder="Wickets last 5 overs">

<br>

<button onclick="predict()">Predict Score</button>

<h2 id="result">Training model...</h2>
</div>

<div class="card">
<h2>⭐ Fantasy Suggestion</h2>
<button onclick="suggest()">Generate Team</button>
<div id="players"></div>
</div>

<script>

// Encode teams
const teams = ["MI","CSK","RCB","KKR","SRH","DC","RR","PBKS","GT","LSG"];

function encodeTeam(team) {
  return teams.indexOf(team);
}

// Create Deep Learning Model
const model = tf.sequential();
model.add(tf.layers.dense({units: 16, activation: 'relu', inputShape: [5]}));
model.add(tf.layers.dense({units: 8, activation: 'relu'}));
model.add(tf.layers.dense({units: 1}));

model.compile({
  optimizer: 'adam',
  loss: 'meanSquaredError'
});

// Dummy training data
const xs = tf.tensor2d([
  [0,1,50,45,2],
  [1,0,45,50,3],
  [2,3,60,60,2],
  [3,2,48,48,4],
  [4,5,55,55,1],
  [5,4,52,52,2],
  [6,7,65,65,2],
  [7,6,49,49,3]
]);

const ys = tf.tensor2d([
  [180],[175],[190],[165],[185],[178],[200],[170]
]);

async function trainModel() {
  await model.fit(xs, ys, {
    epochs: 100,
    callbacks: {
      onEpochEnd: (epoch, logs) => {
        document.getElementById("result").innerText =
          "Training... Epoch " + epoch;
      }
    }
  });

  document.getElementById("result").innerText =
    "Model Ready ✅";
}

trainModel();

async function predict() {

  const team = encodeTeam(document.getElementById("team").value);
  const opponent = encodeTeam(document.getElementById("opponent").value);
  const powerplay = parseInt(document.getElementById("powerplay").value) || 50;
  const runs = parseInt(document.getElementById("runs").value) || 50;
  const wickets = parseInt(document.getElementById("wickets").value) || 2;

  const input = tf.tensor2d([[team, opponent, powerplay, runs, wickets]]);
  const prediction = model.predict(input);

  const score = (await prediction.data())[0];

  document.getElementById("result").innerText =
    "Predicted Score: " + Math.round(score);
}


// Fantasy logic
function suggest() {

  let players = [
    {name:"Virat Kohli", form:95},
    {name:"Rohit Sharma", form:85},
    {name:"Gill", form:92},
    {name:"Buttler", form:90},
    {name:"Hardik", form:91},
    {name:"Russell", form:93},
    {name:"Bumrah", form:94}
  ];

  players.sort((a,b) => b.form - a.form);

  let top = players.slice(0,5);

  let output = "<h3>Top Picks:</h3>";

  top.forEach(p => {
    output += `<p>${p.name} - ${p.form}</p>`;
  });

  document.getElementById("players").innerHTML = output;
}

</script>

</body>
</html>
