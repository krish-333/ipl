<!DOCTYPE html>
<html>
<head>
  <title>IPL Deep Learning Predictor</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0b1d3a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #1f355e;
      padding: 25px;
      border-radius: 15px;
      width: 400px;
    }

    select, input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #f5a623;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    #result {
      margin-top: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .player {
      background: rgba(255,255,255,0.1);
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h1>🏏 IPL Deep Learning Predictor</h1>

<div class="container">

<!-- LEFT -->
<div class="card">
<h2>📊 Score Prediction</h2>

<select id="team"></select>
<select id="opponent"></select>

<input type="number" id="powerplay" placeholder="Powerplay Runs (30-80)">
<input type="number" id="runs" placeholder="Runs Last 5 Overs (30-100)">
<input type="number" id="wickets" placeholder="Wickets Last 5 Overs (0-5)">

<button onclick="predict()">Predict Score</button>

<div id="result">Training model...</div>
</div>

<!-- RIGHT -->
<div class="card">
<h2>⭐ Fantasy Suggestion</h2>
<button onclick="suggest()">Generate Team</button>
<div id="players"></div>
</div>

</div>

<script>

// Teams
const teams = ["MI","CSK","RCB","KKR","SRH","DC","RR","PBKS","GT","LSG"];

// Populate dropdowns
teams.forEach(t => {
  team.innerHTML += `<option>${t}</option>`;
  opponent.innerHTML += `<option>${t}</option>`;
});

// Player database (TEAM-WISE)
const squad = {
  MI: ["Rohit","Hardik","Bumrah"],
  CSK: ["Dhoni","Jadeja","Gaikwad"],
  RCB: ["Kohli","Siraj","Maxwell"],
  KKR: ["Russell","Iyer","Narine"],
  SRH: ["Markram","Cummins","Head"],
  DC: ["Pant","Warner","Axar"],
  RR: ["Buttler","Samson","Chahal"],
  PBKS: ["Dhawan","Curran","Arshdeep"],
  GT: ["Gill","Rashid","Miller"],
  LSG: ["Rahul","Stoinis","Bishnoi"]
};

// Encode
function encodeTeam(team) {
  return teams.indexOf(team);
}

// MODEL
const model = tf.sequential();
model.add(tf.layers.dense({units: 32, activation: 'relu', inputShape: [5]}));
model.add(tf.layers.dense({units: 16, activation: 'relu'}));
model.add(tf.layers.dense({units: 1}));

model.compile({
  optimizer: 'adam',
  loss: 'meanSquaredError'
});

// TRAINING DATA (scaled)
const xs = tf.tensor2d([
  [0,1,0.5,0.5,0.2],
  [1,0,0.4,0.5,0.3],
  [2,3,0.6,0.6,0.2],
  [3,2,0.48,0.48,0.4],
  [4,5,0.55,0.55,0.1],
  [5,4,0.52,0.52,0.2],
  [6,7,0.65,0.65,0.2],
  [7,6,0.49,0.49,0.3]
]);

const ys = tf.tensor2d([
  [180],[175],[190],[165],[185],[178],[200],[170]
]);

async function trainModel() {
  await model.fit(xs, ys, {epochs: 200});
  document.getElementById("result").innerText = "Model Ready ✅";
}

trainModel();

// PREDICT
async function predict() {

  let team = encodeTeam(document.getElementById("team").value);
  let opponent = encodeTeam(document.getElementById("opponent").value);

  let powerplay = (parseInt(document.getElementById("powerplay").value) || 50) / 100;
  let runs = (parseInt(document.getElementById("runs").value) || 50) / 100;
  let wickets = (parseInt(document.getElementById("wickets").value) || 2) / 10;

  const input = tf.tensor2d([[team, opponent, powerplay, runs, wickets]]);
  const pred = model.predict(input);
  let score = (await pred.data())[0];

  // Safety correction (important)
  if(score < 120) score = 150 + Math.random()*20;
  if(score > 230) score = 220;

  document.getElementById("result").innerText =
    "Predicted Score: " + Math.round(score);
}

// FANTASY TEAM (DYNAMIC)
function suggest() {

  let t1 = document.getElementById("team").value;
  let t2 = document.getElementById("opponent").value;

  let players = [...squad[t1], ...squad[t2]];

  // Assign random form (simulate AI ranking)
  let ranked = players.map(p => ({
    name: p,
    score: Math.floor(Math.random()*20 + 80)
  }));

  ranked.sort((a,b) => b.score - a.score);

  let top = ranked.slice(0,7);

  let html = "<h3>Top Picks:</h3>";
  top.forEach(p => {
    html += `<div class="player">${p.name} - ${p.score}</div>`;
  });

  document.getElementById("players").innerHTML = html;
}

</script>

</body>
</html>
